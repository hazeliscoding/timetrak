schema: spec-driven

context: |
  Project: TimeTrak
  Product type: Time tracking and billing application for contractors, freelancers, and small teams
  Stage: Post-MVP — Stage 2 (Stabilize). MVP bootstrap is complete and archived. Active work focuses on
  hardening authorization, timer integrity, rate resolution, reporting correctness, UI polish, accessibility
  compliance, and establishing the component library foundation.

  Stack:
  - Go backend (modular monolith)
  - Server-rendered HTML templates + HTMX for partial page updates
  - PostgreSQL (system of record)
  - Minimal custom JavaScript

  Architecture:
  - Workspace is the authorization boundary
  - Client -> Project -> Time Entry is the main domain hierarchy
  - Rates resolve by precedence: project, client, workspace default
  - Accepted domains: auth, workspace, clients, projects, tracking, rates, reporting

  Data conventions:
  - UUID primary keys
  - timestamptz for all persisted timestamps
  - Money stored as integer minor units, never floats
  - Transactional tables normalized to 3NF unless there is a documented read-model reason

  Product behavior:
  - Fast and clear workflows for starting timers, stopping timers, editing entries, and reviewing billable time
  - Solo freelancers first; model is extensible for workspaces and teams in Stage 3

  UI direction:
  - Calm, trustworthy, tool-like, and professional
  - Data-first layouts over flashy marketing visuals
  - Medium-density UI suitable for tables, forms, and reporting
  - One restrained accent color and a strong neutral system
  - Prefer borders and spacing over heavy shadows
  - Avoid generic AI-SaaS patterns: blob art, oversized hero sections, random gradients, vague productivity copy
  - Tables are first-class citizens
  - Domain-specific copy: Start timer, Billable this week, Client rate, Running entry
  - Component library foundation is being established in Stage 2 — prefer reusable partials over bespoke markup

  UI conventions:
  - Server-rendered flows over SPA patterns
  - HTMX for timers, inline edits, filtering, pagination, and modals
  - Semantic HTML first; prefer native controls before custom widgets
  - Preserve sensible focus behavior after HTMX swaps

  Accessibility:
  - WCAG 2.2 AA is the enforced baseline
  - Visible labels, visible keyboard focus, sufficient contrast, comfortable target sizes
  - Color must never be the sole means of conveying status or meaning

  Documentation:
  - Use docs/time_tracking_design_doc.md as the system and product architecture reference
  - Use docs/timetrak_ui_style_guide.md as the UI and UX reference
  - Treat openspec/specs as the source of truth for accepted behavior
  - Keep requirements implementation-agnostic where possible

rules:
  proposal:
    - One change per meaningful unit of work. Never umbrella proposals like phase-2 or misc-cleanup.
    - State what is in scope and out of scope explicitly.
    - Call out assumptions, risks, and likely follow-up changes.
    - Stage 2 changes should harden, polish, or stabilize existing behavior — not expand the domain model.
    - Stage 3 changes may introduce new capability; call that out explicitly in the proposal.
    - When UI is affected, describe the intended user-facing workflow and how it aligns with the style guide.

  specs:
    - Write requirements with MUST or SHALL language.
    - Use GIVEN/WHEN/THEN scenarios.
    - Prefer one requirement per business capability.
    - Organize specs by domain: auth, workspace, clients, projects, tracking, rates, reporting.
    - Include accessibility requirements when a feature introduces or changes user interaction.
    - Specify user-visible states clearly: empty, loading, success, validation error, and destructive actions.

  design:
    - Include Mermaid diagrams for architecture, request flows, and schema relationships when relevant.
    - Explain tradeoffs, not just the chosen approach.
    - Reflect Go + HTMX + PostgreSQL constraints.
    - When UI is involved, describe page structure, interaction patterns, focus handling, and server-rendered partial update behavior.
    - Favor semantic HTML and simple interaction models before inventing custom components.
    - Avoid generic SaaS visual language; the product should feel like a trustworthy work tool.

  tasks:
    - Break work into small, implementation-ready tasks.
    - Group tasks by backend, database, templates, and HTMX behavior where appropriate.
    - Include validation and testing tasks for critical flows like timer start/stop and rate resolution.
    - For UI work, include accessibility validation tasks for keyboard access, focus states, labels, contrast, and status/error messaging.
    - Call out any reusable component or template partial that should be created instead of duplicating markup.