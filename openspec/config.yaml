schema: spec-driven

context: |
  Project: TimeTrak
  Product type: Time tracking and billing application for contractors, freelancers, and small teams

  Stack:
  - Go backend
  - Server-rendered HTML templates
  - HTMX for partial page updates
  - PostgreSQL database

  Architecture:
  - Modular monolith first
  - Workspace is the authorization boundary
  - Client -> Project -> Time Entry is the main domain hierarchy
  - Rates resolve by precedence: project, client, workspace default
  - PostgreSQL is the system of record

  Data conventions:
  - Prefer UUID primary keys
  - Use timestamptz for persisted timestamps
  - Store money in integer minor units, never floats
  - Keep transactional tables normalized to 3NF unless there is a clear read-model reason not to

  Product behavior:
  - Prioritize fast and clear workflows for starting timers, stopping timers, editing entries, and reviewing billable time
  - Design for solo freelancers first, while keeping the model extensible for workspaces and teams later

  UI direction:
  - Calm, trustworthy, tool-like, and professional
  - Data-first layouts over flashy marketing visuals
  - Medium-density UI suitable for tables, forms, and reporting
  - Use one restrained accent color and a strong neutral system
  - Prefer borders and spacing over heavy shadows
  - Avoid generic AI-SaaS patterns such as blob art, oversized hero sections, random gradients, and vague productivity copy
  - Make tables first-class citizens
  - Write domain-specific product copy such as Start timer, Billable this week, Client rate, Running entry

  UI conventions:
  - Prefer server-rendered flows over SPA patterns
  - Use HTMX for timers, inline edits, filtering, pagination, and modals
  - Keep custom JavaScript minimal
  - Use semantic HTML first
  - Preserve sensible focus behavior after HTMX swaps
  - Build accessible forms, tables, and navigation from the start

  Accessibility target:
  - Target WCAG 2.2 AA
  - Ensure visible labels and instructions
  - Ensure visible keyboard focus
  - Ensure color is not the only means of conveying status or meaning
  - Ensure sufficient text and UI contrast
  - Ensure comfortable interactive target sizes
  - Prefer native controls before custom widgets

  Documentation:
  - Use docs/time_tracking_design_doc.md as the system and product architecture reference
  - Use docs/time_trak_mvp_ui_style_guide.md as the UI and UX reference
  - Treat openspec/specs as the source of truth for accepted behavior
  - Keep requirements implementation-agnostic where possible

rules:
  proposal:
    - Keep scope MVP-first unless the request explicitly says otherwise.
    - State what is in scope and out of scope.
    - Call out assumptions, risks, and likely follow-up phases.
    - When UI is affected, describe the intended user-facing workflow and why it improves usability.

  specs:
    - Write requirements with MUST or SHALL language.
    - Use GIVEN/WHEN/THEN scenarios.
    - Prefer one requirement per business capability.
    - Organize specs by domain: auth, workspace, clients, projects, tracking, rates, reporting.
    - Include accessibility requirements when a feature introduces or changes user interaction.
    - Specify user-visible states clearly: empty, loading, success, validation error, and destructive actions.

  design:
    - Include Mermaid diagrams for architecture, request flows, and schema relationships when relevant.
    - Explain tradeoffs, not just the chosen approach.
    - Reflect Go + HTMX + PostgreSQL constraints.
    - When UI is involved, describe page structure, interaction patterns, focus handling, and server-rendered partial update behavior.
    - Favor semantic HTML and simple interaction models before inventing custom components.
    - Avoid generic SaaS visual language; the product should feel like a trustworthy work tool.

  tasks:
    - Break work into small, implementation-ready tasks.
    - Group tasks by backend, database, templates, and HTMX behavior where appropriate.
    - Include validation and testing tasks for critical flows like timer start/stop and rate resolution.
    - For UI work, include accessibility validation tasks for keyboard access, focus states, labels, contrast, and status/error messaging.
    - Call out any reusable component or template partial that should be created instead of duplicating markup.