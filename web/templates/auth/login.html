{{define "title"}}Sign in · TimeTrak{{end}}
{{define "content"}}
<section class="card" style="max-width:420px;margin:10vh auto;">
  <h1>Sign in</h1>
  <p class="muted">Track billable time, clients, and projects.</p>

  {{if .Error}}
    <div class="flash flash-error" role="alert" aria-live="assertive">{{.Error}}</div>
  {{end}}

  <form method="post" action="/login" novalidate>
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="username" required
             value="{{.Email}}" autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <button class="btn btn-primary" type="submit">Sign in</button>
  </form>

  <p class="muted" style="margin-top:var(--space-5)">
    New here? <a href="/signup">Create an account</a>.
  </p>
</section>
{{end}}
