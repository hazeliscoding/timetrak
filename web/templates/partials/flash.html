{{define "flash"}}
  {{if .}}
    {{range .}}
      {{if eq .Kind "error"}}
        <div class="flash flash-{{.Kind}}" role="alert">{{.Message}}</div>
      {{else}}
        <div class="flash flash-{{.Kind}}" role="status" aria-live="polite">{{.Message}}</div>
      {{end}}
    {{end}}
  {{end}}
{{end}}
