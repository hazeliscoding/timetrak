{{define "title"}}Reports · TimeTrak{{end}}
{{define "shell"}}{{template "app-shell" .}}{{end}}
{{define "content"}}
<section class="stack">
  <h1>Reports</h1>

  <form method="get" action="/reports" class="card"
        hx-get="/reports/partial"
        hx-target="#report-results"
        hx-swap="innerHTML"
        hx-push-url="true"
        hx-trigger="change from:find select, change from:find input[type=date], submit"
        hx-indicator="#report-loading">
    <h2 class="mt-0">Date range &amp; grouping</h2>
    <div class="row">
      <div class="field" style="margin-bottom:0">
        <label for="r-preset">Preset</label>
        <select id="r-preset" name="preset" data-focus-after-swap>
          <option value="this_week" {{if eq .Preset "this_week"}}selected{{end}}>This week</option>
          <option value="last_week" {{if eq .Preset "last_week"}}selected{{end}}>Last week</option>
          <option value="this_month" {{if eq .Preset "this_month"}}selected{{end}}>This month</option>
          <option value="last_month" {{if eq .Preset "last_month"}}selected{{end}}>Last month</option>
          <option value="today" {{if eq .Preset "today"}}selected{{end}}>Today</option>
          <option value="custom" {{if eq .Preset "custom"}}selected{{end}}>Custom</option>
        </select>
      </div>
      <div class="field" style="margin-bottom:0">
        <label for="r-from">From</label>
        <input id="r-from" name="from" type="date" value="{{.From}}" data-focus-after-swap>
      </div>
      <div class="field" style="margin-bottom:0">
        <label for="r-to">To</label>
        <input id="r-to" name="to" type="date" value="{{.To}}" data-focus-after-swap>
      </div>
      <div class="field" style="margin-bottom:0">
        <label for="r-group">Group by</label>
        <select id="r-group" name="group" data-focus-after-swap>
          <option value="day" {{if eq .Grouping "day"}}selected{{end}}>Day</option>
          <option value="client" {{if eq .Grouping "client"}}selected{{end}}>Client</option>
          <option value="project" {{if eq .Grouping "project"}}selected{{end}}>Project</option>
        </select>
      </div>
      <div class="field" style="margin-bottom:0">
        <label for="r-billable">Billable</label>
        <select id="r-billable" name="billable" data-focus-after-swap>
          <option value="" {{if eq .Billable ""}}selected{{end}}>All</option>
          <option value="yes" {{if eq .Billable "yes"}}selected{{end}}>Billable only</option>
          <option value="no" {{if eq .Billable "no"}}selected{{end}}>Non-billable only</option>
        </select>
      </div>
      <div class="field" style="margin-bottom:0">
        <label for="r-client">Client</label>
        <select id="r-client" name="client_id" data-focus-after-swap>
          <option value="">All clients</option>
          {{range .ActiveClients}}
            <option value="{{.ID}}" {{if eq $.ClientID (printf "%s" .ID)}}selected{{end}}>{{.Name}}</option>
          {{end}}
        </select>
      </div>
      <div class="field" style="margin-bottom:0">
        <label for="r-project">Project</label>
        <select id="r-project" name="project_id" data-focus-after-swap>
          <option value="">All projects</option>
          {{range .ActiveProjects}}
            <option value="{{.ID}}" {{if eq $.ProjectID (printf "%s" .ID)}}selected{{end}}>{{.Name}}</option>
          {{end}}
        </select>
      </div>
      <button class="btn btn-primary" type="submit">Apply</button>
    </div>
    {{if .Timezone}}
      <p class="muted" style="margin-top:.5rem">Bucketed in <code>{{.Timezone}}</code>. <a href="/workspace/settings">Change</a></p>
    {{end}}
    {{template "spinner" .}}
  </form>

  <div id="report-results" aria-live="polite"
       hx-trigger="workspace-changed from:body"
       hx-get="/reports/partial"
       hx-include="previous form"
       hx-swap="innerHTML">
    {{template "reports.partial.results" .}}
  </div>
</section>
{{end}}
